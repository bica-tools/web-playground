<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Dashboard | Session Types Research</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d0d1a;
  --bg-secondary: #151528;
  --bg-tertiary: #1a1a2e;
  --bg-card: #1e1e38;
  --bg-hover: #252545;
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0b8;
  --text-muted: #6a6a88;
  --border: #2a2a4a;
  --T: #4CAF50; --I: #2196F3; --V: #FF9800; --P: #E91E63;
  --B: #9C27B0; --W: #00BCD4; --E: #FFC107;
  --health-green: #4CAF50; --health-yellow: #FFC107;
  --health-amber: #FF9800; --health-red: #f44336;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Header ─────────────────────────────────────── */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.header-title span { color: var(--text-primary); }

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-date {
  font-size: 13px;
  color: var(--text-muted);
}

.btn-reset {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: var(--health-amber); color: var(--health-amber); }

/* ── Sector Health Bar ──────────────────────────── */
.sector-bar {
  display: flex;
  gap: 4px;
  padding: 12px 24px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}

.sector-card {
  flex: 1;
  min-width: 110px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s;
  border: 2px solid transparent;
  text-align: center;
  position: relative;
}
.sector-card:hover { background: var(--bg-hover); }
.sector-card.active { border-color: var(--sector-color); background: var(--bg-hover); }

.sector-indicator {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  vertical-align: middle;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.sector-indicator.pulse { animation: pulse 2s ease-in-out infinite; }

.sector-code {
  font-weight: 700;
  font-size: 15px;
  display: inline;
  vertical-align: middle;
}

.sector-name {
  font-size: 11px;
  color: var(--text-muted);
  display: block;
  margin-top: 4px;
}

.sector-metric {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
  font-weight: 500;
}

.sector-trend {
  font-size: 11px;
  margin-top: 1px;
}
.sector-trend.up { color: var(--health-green); }
.sector-trend.steady { color: var(--text-muted); }
.sector-trend.flat { color: var(--health-amber); }

/* ── Main Layout ────────────────────────────────── */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: 1fr auto;
  height: calc(100vh - 120px);
}

@media (max-width: 900px) {
  .main-layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
    height: auto;
  }
}

/* ── Orbital View ───────────────────────────────── */
.orbital-container {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

.orbital-svg {
  width: 100%;
  height: 100%;
  max-width: 700px;
  max-height: 700px;
}

/* ── Sidebar ────────────────────────────────────── */
.sidebar {
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.sidebar-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* ── Capacity Budget ────────────────────────────── */
.capacity-bar {
  display: flex;
  height: 20px;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 10px;
}

.capacity-segment {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
}
.capacity-segment.depth { background: #5c6bc0; }
.capacity-segment.breadth { background: #26a69a; }
.capacity-segment.maint { background: #8d6e63; }
.capacity-segment.explore { background: #ab47bc; }

.capacity-legend {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  font-size: 11px;
}

.capacity-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
}

.capacity-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── Detail Panel ───────────────────────────────── */
.detail-panel {
  display: none;
}
.detail-panel.visible { display: block; }

.detail-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.3;
}

.detail-sector-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 8px;
}

.detail-meta {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.detail-description {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-top: 8px;
}

.detail-close {
  float: right;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
}
.detail-close:hover { color: var(--text-primary); }

/* ── Inner Orbit Checklist ──────────────────────── */
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.2s;
}
.checklist-item:last-child { border-bottom: none; }
.checklist-item.done { opacity: 0.5; }
.checklist-item.done .checklist-text { text-decoration: line-through; }

.checklist-checkbox {
  width: 16px; height: 16px;
  border: 2px solid var(--text-muted);
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.checklist-item.done .checklist-checkbox {
  background: var(--health-green);
  border-color: var(--health-green);
}
.checklist-item.done .checklist-checkbox::after {
  content: '';
  width: 6px; height: 10px;
  border: solid #fff;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-bottom: 2px;
}

.checklist-sector {
  font-size: 10px;
  font-weight: 700;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.checklist-text {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.4;
}

/* ── Publication Pipeline ──────────────────────── */
.pipeline-container {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  overflow-x: auto;
}

.pipeline-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.pipeline-toggle {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
.pipeline-toggle:hover { border-color: var(--V); color: var(--V); }
.pipeline-toggle.active { border-color: var(--V); color: var(--V); background: rgba(255,152,0,0.1); }

.pipeline-content { display: none; }
.pipeline-content.visible { display: block; }

.pipeline-acts {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
}

.pipeline-act {
  flex: 1;
  min-width: 200px;
  border-radius: 8px;
  overflow: hidden;
}

.pipeline-act-header {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.act-I .pipeline-act-header { background: rgba(33,150,243,0.2); color: #64B5F6; }
.act-II .pipeline-act-header { background: rgba(76,175,80,0.2); color: #81C784; }
.act-III .pipeline-act-header { background: rgba(255,152,0,0.2); color: #FFB74D; }
.act-IV .pipeline-act-header { background: rgba(156,39,176,0.2); color: #CE93D8; }

.pipeline-act-body {
  background: var(--bg-card);
  padding: 8px;
}

.pipeline-paper {
  padding: 8px 10px;
  border-radius: 6px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.2s;
  border-left: 3px solid transparent;
}
.pipeline-paper:last-child { margin-bottom: 0; }
.pipeline-paper:hover { background: var(--bg-hover); }
.pipeline-paper.status-ready { border-left-color: var(--health-green); }
.pipeline-paper.status-polishing { border-left-color: var(--health-yellow); }
.pipeline-paper.status-draft { border-left-color: var(--health-amber); }
.pipeline-paper.status-planned { border-left-color: var(--text-muted); }
.pipeline-paper.status-contingency { border-left-color: var(--border); }
.pipeline-paper.status-urgent { border-left-color: var(--health-red); }

.pipeline-paper-venue {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}

.pipeline-paper-title {
  font-size: 12px;
  color: var(--text-primary);
  margin-top: 2px;
  line-height: 1.3;
}

.pipeline-paper-meta {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
  display: flex;
  gap: 8px;
}

.pipeline-paper-deadline {
  color: var(--health-amber);
  font-weight: 600;
}
.pipeline-paper-deadline.urgent {
  color: var(--health-red);
  animation: pulse 1.5s ease-in-out infinite;
}

.pipeline-paper-status {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
}
.pipeline-paper-status.ready { background: rgba(76,175,80,0.2); color: #81C784; }
.pipeline-paper-status.polishing { background: rgba(255,193,7,0.2); color: #FFD54F; }
.pipeline-paper-status.draft { background: rgba(255,152,0,0.2); color: #FFB74D; }
.pipeline-paper-status.planned { background: rgba(100,100,130,0.2); color: #8888aa; }
.pipeline-paper-status.contingency { background: rgba(60,60,80,0.2); color: #666688; }
.pipeline-paper-status.urgent { background: rgba(244,67,54,0.2); color: #ef5350; }

/* ── Timeline ──────────────────────────────────── */
.timeline-bar {
  display: flex;
  align-items: stretch;
  height: 36px;
  border-radius: 6px;
  overflow: hidden;
  margin-top: 12px;
  position: relative;
}

.timeline-segment {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 600;
  color: #fff;
  position: relative;
  min-width: 30px;
  transition: opacity 0.2s;
}
.timeline-segment:hover { opacity: 0.85; }

.timeline-now {
  position: absolute;
  top: -4px;
  bottom: -4px;
  width: 2px;
  background: #fff;
  z-index: 10;
  border-radius: 1px;
}
.timeline-now::after {
  content: 'NOW';
  position: absolute;
  top: -14px;
  left: -10px;
  font-size: 8px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}

.timeline-labels {
  display: flex;
  margin-top: 4px;
  font-size: 9px;
  color: var(--text-muted);
}
.timeline-labels span {
  text-align: center;
}

/* ── Footer ─────────────────────────────────────── */
.footer {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  align-items: center;
  justify-content: center;
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}

/* ── Tooltip ────────────────────────────────────── */
.tooltip {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-primary);
  pointer-events: none;
  z-index: 200;
  max-width: 250px;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}

/* ── Orbit labels ───────────────────────────────── */
.orbit-label {
  font-size: 10px;
  fill: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

/* ── SVG nodes ──────────────────────────────────── */
.orbit-node { cursor: pointer; transition: transform 0.2s; }
.orbit-node:hover { filter: brightness(1.3); }
.orbit-node circle { transition: r 0.15s; }
.orbit-node:hover circle { r: 14; }

@keyframes orbitRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.orbit-ring { fill: none; stroke: var(--border); stroke-dasharray: 4 8; }
.orbit-ring-inner { stroke-width: 1; opacity: 0.6; }
.orbit-ring-middle { stroke-width: 1; opacity: 0.4; }
.orbit-ring-outer { stroke-width: 1; opacity: 0.25; }

.node-hidden { opacity: 0.08; pointer-events: none; }
</style>
</head>

<!-- Header -->
<div class="header">
  <div class="header-title"><span>Orbital Dashboard</span> &mdash; Session Types Research</div>
  <div class="header-right">
    <span class="header-date">Week of Mar 30 &ndash; Apr 5, 2026</span>
    <button class="btn-reset" onclick="resetState()">Reset</button>
  </div>
</div>

<!-- Sector Health Bar -->
<div class="sector-bar" id="sectorBar"></div>

<!-- Main Layout -->
<div class="main-layout">
  <!-- Orbital View -->
  <div class="orbital-container">
    <svg class="orbital-svg" id="orbitalSvg" viewBox="0 0 700 700"></svg>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Capacity Budget -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">Capacity Budget</div>

        <div class="capacity-segment depth" style="width:40%">40%</div>

  </div>

  <!-- Footer -->
  <div class="footer" id="footer"></div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

// ── DATA ─────────────────────────────────────────────

  { id: 'P7', act: 'III', actName: 'The Practice', title: 'Bottom-Up Multiparty Session Types via Lattice Composition',

// ── RENDER: ORBITAL SVG ─────────────────────────────
function renderOrbital() {
  const svg = document.getElementById('orbitalSvg');
  const cx = 350, cy = 350;
  const rInner = 100, rMiddle = 200, rOuter = 300;

  let html = '';

  // Orbit rings
  html += `<circle cx="${cx}" cy="${cy}" r="${rInner}" class="orbit-ring orbit-ring-inner"/>`;
  html += `<circle cx="${cx}" cy="${cy}" r="${rMiddle}" class="orbit-ring orbit-ring-middle"/>`;
  html += `<circle cx="${cx}" cy="${cy}" r="${rOuter}" class="orbit-ring orbit-ring-outer"/>`;

  // Orbit labels
  html += `<text x="${cx}" y="${cy - rInner - 8}" text-anchor="middle" class="orbit-label">Inner</text>`;
  html += `<text x="${cx}" y="${cy - rMiddle - 8}" text-anchor="middle" class="orbit-label">Middle</text>`;
  html += `<text x="${cx}" y="${cy - rOuter - 8}" text-anchor="middle" class="orbit-label">Outer</text>`;

  // Centre
  html += `<circle cx="${cx}" cy="${cy}" r="24" fill="${'#252545'}" stroke="${'#3a3a5a'}" stroke-width="1.5"/>`;
  html += `<text x="${cx}" y="${cy + 1}" text-anchor="middle" dominant-baseline="central" fill="${'#a0a0b8'}" font-size="9" font-weight="600" letter-spacing="1">FOCUS</text>`;

  // Place nodes
  function placeNodes(items, radius, orbit) {
    const n = items.length;
    items.forEach((item, i) => {
      const angle = (2 * Math.PI * i / n) - Math.PI / 2;
      const x = cx + radius * Math.cos(angle);
      const y = cy + radius * Math.sin(angle);
      const color = SECTOR_COLORS[item.sector];
      const hidden = activeSector && item.sector !== activeSector;
      const r = orbit === 'inner' ? 12 : orbit === 'middle' ? 10 : 7;
      const label = orbit === 'inner' ? item.task.slice(0, 12) :
                    orbit === 'middle' ? item.name.slice(0, 12) :
                    item.name.slice(0, 10);
      const fullLabel = orbit === 'inner' ? item.task :
                        orbit === 'middle' ? item.name :
                        item.name;
      const isDone = orbit === 'inner' && item.done;

      html += `<g class="orbit-node ${hidden ? 'node-hidden' : ''}"
                  data-orbit="${orbit}" data-id="${item.id}"
                  onmouseenter="showTooltip(event, '${fullLabel.replace(/'/g, "\\'")} [${item.sector}]')"
                  onmouseleave="hideTooltip()"
                  onclick="selectItem('${orbit}','${item.id}')">
        <circle cx="${x}" cy="${y}" r="${r}" fill="${color}" opacity="${isDone ? 0.35 : 0.85}"
                stroke="${isDone ? '#666' : color}" stroke-width="2"/>
        ${isDone ? `<line x1="${x-4}" y1="${y}" x2="${x+4}" y2="${y}" stroke="#fff" stroke-width="2"/>
                    <line x1="${x}" y1="${y-4}" x2="${x}" y2="${y+4}" stroke="#fff" stroke-width="2" transform="rotate(45,${x},${y})"/>` : ''}
        <text x="${x}" y="${y + r + 14}" text-anchor="middle" fill="${hidden ? '#333' : '#888'}"
              font-size="9" font-weight="500">${label}</text>
      </g>`;
    });
  }

  placeNodes(innerOrbit, rInner, 'inner');
  placeNodes(middleOrbit, rMiddle, 'middle');
  placeNodes(outerOrbit, rOuter, 'outer');

  svg.innerHTML = html;
}

  h += '<div class="detail-meta">Status: <span class="pipeline-paper-status ' + paper.status + '">' + paper.status + '</span></div>';
  h += '<div class="detail-description">' + paper.description + '</div>';
  ct.innerHTML = h;
  panel.classList.add('visible');
}

// ── RENDER ALL ──────────────────────────────────────
function render() {
  renderSectorBar();
  renderOrbital();
  renderChecklist();
  renderFooter();
}

loadDoneState();
render();
</script>
</body>
