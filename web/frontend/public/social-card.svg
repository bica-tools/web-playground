<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="200" x2="800" y2="630"/>
    <line x1="0" y1="400" x2="400" y2="630"/>
  </g>

  <!-- Left side: Text content -->
  <!-- Title -->
  <text x="80" y="220" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="white" letter-spacing="1">BICA Tools</text>

  <!-- Subtitle -->
  <text x="80" y="280" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="white" opacity="0.8">Session Types as Algebraic Reticulates</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" opacity="0.55">Parse. Analyze. Verify. Visualize.</text>

  <!-- Decorative line under text -->
  <rect x="80" y="350" width="120" height="3" rx="1.5" fill="#93c5fd" opacity="0.7"/>

  <!-- Bottom URL -->
  <text x="80" y="570" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" opacity="0.5" letter-spacing="2">bica-tools.org</text>

  <!-- Right side: Lattice / Hasse diagram -->
  <!-- 7-node lattice: diamond with extra nodes -->
  <!-- Layout (cx, cy):
       Top:        (880, 120)
       Upper-L:    (780, 230)
       Upper-R:    (980, 230)
       Mid:        (880, 310)
       Lower-L:    (780, 400)
       Lower-R:    (980, 400)
       Bottom:     (880, 500)
  -->

  <!-- Edges -->
  <g stroke="#93c5fd" stroke-width="2" opacity="0.5">
    <!-- Top to upper -->
    <line x1="880" y1="120" x2="780" y2="230"/>
    <line x1="880" y1="120" x2="980" y2="230"/>
    <!-- Upper to mid -->
    <line x1="780" y1="230" x2="880" y2="310"/>
    <line x1="980" y1="230" x2="880" y2="310"/>
    <!-- Upper to lower (cross edges for richer lattice) -->
    <line x1="780" y1="230" x2="780" y2="400"/>
    <line x1="980" y1="230" x2="980" y2="400"/>
    <!-- Mid to lower -->
    <line x1="880" y1="310" x2="780" y2="400"/>
    <line x1="880" y1="310" x2="980" y2="400"/>
    <!-- Lower to bottom -->
    <line x1="780" y1="400" x2="880" y2="500"/>
    <line x1="980" y1="400" x2="880" y2="500"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- Top node (initial state) -->
    <circle cx="880" cy="120" r="10" fill="url(#nodeGlow)" opacity="0.9"/>
    <circle cx="880" cy="120" r="5" fill="white"/>

    <!-- Upper-left -->
    <circle cx="780" cy="230" r="9" fill="url(#nodeGlow)" opacity="0.8"/>
    <circle cx="780" cy="230" r="4.5" fill="white" opacity="0.9"/>

    <!-- Upper-right -->
    <circle cx="980" cy="230" r="9" fill="url(#nodeGlow)" opacity="0.8"/>
    <circle cx="980" cy="230" r="4.5" fill="white" opacity="0.9"/>

    <!-- Middle -->
    <circle cx="880" cy="310" r="9" fill="url(#nodeGlow)" opacity="0.8"/>
    <circle cx="880" cy="310" r="4.5" fill="white" opacity="0.9"/>

    <!-- Lower-left -->
    <circle cx="780" cy="400" r="9" fill="url(#nodeGlow)" opacity="0.8"/>
    <circle cx="780" cy="400" r="4.5" fill="white" opacity="0.9"/>

    <!-- Lower-right -->
    <circle cx="980" cy="400" r="9" fill="url(#nodeGlow)" opacity="0.8"/>
    <circle cx="980" cy="400" r="4.5" fill="white" opacity="0.9"/>

    <!-- Bottom node (end state) -->
    <circle cx="880" cy="500" r="10" fill="url(#nodeGlow)" opacity="0.9"/>
    <circle cx="880" cy="500" r="5" fill="white"/>
  </g>

  <!-- Node labels (small, subtle) -->
  <g font-family="monospace, Courier" font-size="11" fill="white" opacity="0.4" text-anchor="middle">
    <text x="880" y="105">top</text>
    <text x="880" y="525">end</text>
  </g>
</svg>
