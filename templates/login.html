{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<section style="max-width: 400px; margin: 10vh auto;">
    <hgroup>
        <h2>Reticulate</h2>
        <p>Enter the site password to continue.</p>
    </hgroup>

    {% if error %}
    <p style="color: var(--pico-del-color, #c62828);">Incorrect password. Please try again.</p>
    {% endif %}

    <form method="post" action="/login">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required autofocus>
        <button type="submit">Log in</button>
    </form>
</section>
{% endblock %}
