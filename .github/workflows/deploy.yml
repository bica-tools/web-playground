# Deploy bica-tools.org via Docker
# Builds image, pushes to GHCR, deploys to production server via SSH
#
# Required GitHub Secrets (set in bica-tools org settings):
#   DEPLOY_HOST       — production server IP/hostname
#   DEPLOY_USER       — SSH user on production server
#   DEPLOY_SSH_KEY    — SSH private key for deployment

name: Deploy bica-tools.org

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bica-tools/web-playground

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== Pulling latest image ==="
            docker pull ghcr.io/bica-tools/web-playground:latest

            echo "=== Stopping old container ==="
            docker stop bica-web 2>/dev/null || true
            docker rm bica-web 2>/dev/null || true

            echo "=== Starting new container ==="
            docker run -d \
              --name bica-web \
              --restart unless-stopped \
              -p 8080:8000 \
              -e SERVER_PORT=8000 \
              ghcr.io/bica-tools/web-playground:latest

            echo "=== Waiting for startup ==="
            sleep 10

            echo "=== Health check ==="
            curl -sf http://localhost:8080/api/benchmarks > /dev/null && echo "HEALTHY" || echo "UNHEALTHY"

            echo "=== Done ==="
            docker ps | grep bica-web
